# Wlogout ve Wofi Teması Uyumlu Kitty Ayarları

# Font Ayarları (JetBrainsMono Nerd Font)
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Pencere ve Şeffaflık
background_opacity 0.85
window_padding_width 12

# Ana Renkler (Pywal'den alınacak)
include ~/.cache/wal/colors-kitty.conf

# Diğer Ayarlar
confirm_os_window_close 0
enable_audio_bell no
